<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle with purple gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8e2de2"/>
      <stop offset="100%" stop-color="#4a00e0"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="16" cy="16" r="9" stroke="white" stroke-width="2" fill="none" opacity="0.9"/>
  <!-- Clock hands forming a checkmark-like shape at 10:10 -->
  <line x1="16" y1="16" x2="16" y2="10" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="16" x2="20" y2="19" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Small center dot -->
  <circle cx="16" cy="16" r="1.5" fill="white"/>
</svg>
